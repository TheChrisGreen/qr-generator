<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); max-width: 600px; width: 100%; padding: 40px; }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 2rem; }
        .subtitle { text-align: center; color: #666; margin-bottom: 32px; font-size: 0.95rem; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; color: #444; font-weight: 600; font-size: 0.9rem; }
        select, input, textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; font-family: inherit; transition: border-color 0.2s; }
        select:focus, input:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { resize: vertical; min-height: 100px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4); }
        .btn-danger { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); color: white; }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(235, 51, 73, 0.4); }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        #qr-result { margin-top: 30px; text-align: center; padding: 20px; background: #f8f9fa; border-radius: 12px; display: none; }
        #qr-result.show { display: block; }
        #qr-canvas { max-width: 250px; width: 100%; margin-bottom: 16px; }
        .data-preview { margin-top: 12px; padding: 12px; background: white; border-radius: 8px; font-size: 0.85rem; color: #666; word-break: break-all; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>QR Code Generator</h1>
        <p class="subtitle">Select a type, fill in the details, and generate your QR code</p>
        <div class="form-group">
            <label for="qr-type">QR Code Type</label>
            <select id="qr-type">
                <option value="">- Select a type -</option>
                <option value="text">1. Plain Text</option>
                <option value="url">2. URL / Web Link</option>
                <option value="vcard">3. Contact (vCard)</option>
                <option value="phone">4. Phone Number</option>
                <option value="sms">5. SMS Message</option>
                <option value="email">6. Email</option>
                <option value="wifi">7. Wi-Fi Network</option>
                <option value="calendar">8. Calendar Event</option>
                <option value="geo">9. Geolocation</option>
                <option value="payment">10. Payment Information</option>
                <option value="appstore">11. App Store Link</option>
                <option value="binary">12. Binary Data</option>
            </select>
        </div>
        <div id="fields-text" class="field-group hidden">
            <div class="form-group"><label for="text-content">Text Content</label><textarea id="text-content" placeholder="Enter your text here..."></textarea></div>
        </div>
        <div id="fields-url" class="field-group hidden">
            <div class="form-group"><label for="url-content">URL</label><input type="url" id="url-content" placeholder="https://example.com"></div>
        </div>
        <div id="fields-vcard" class="field-group hidden">
            <div class="row">
                <div class="form-group"><label for="vcard-firstname">First Name</label><input id="vcard-firstname" placeholder="John"></div>
                <div class="form-group"><label for="vcard-lastname">Last Name</label><input id="vcard-lastname" placeholder="Doe"></div>
            </div>
            <div class="form-group"><label for="vcard-phone">Phone</label><input id="vcard-phone" placeholder="+1-555-123-4567"></div>
            <div class="form-group"><label for="vcard-email">Email</label><input id="vcard-email" placeholder="john@example.com"></div>
            <div class="form-group"><label for="vcard-org">Organization</label><input id="vcard-org" placeholder="Company Name"></div>
            <div class="form-group"><label for="vcard-notes">Notes</label><input id="vcard-notes" placeholder="Optional notes"></div>
        </div>
        <div id="fields-phone" class="field-group hidden">
            <div class="form-group"><label for="phone-content">Phone Number</label><input type="tel" id="phone-content" placeholder="+1-555-123-4567"></div>
        </div>
        <div id="fields-sms" class="field-group hidden">
            <div class="form-group"><label for="sms-phone">Phone Number</label><input type="tel" id="sms-phone" placeholder="+1-555-123-4567"></div>
            <div class="form-group"><label for="sms-message">Message</label><textarea id="sms-message" placeholder="Pre-filled message..."></textarea></div>
        </div>
        <div id="fields-email" class="field-group hidden">
            <div class="form-group"><label for="email-to">To</label><input id="email-to" placeholder="recipient@example.com"></div>
            <div class="form-group"><label for="email-subject">Subject</label><input id="email-subject" placeholder="Email subject"></div>
            <div class="form-group"><label for="email-body">Body</label><textarea id="email-body" placeholder="Email body..."></textarea></div>
        </div>
        <div id="fields-wifi" class="field-group hidden">
            <div class="form-group"><label for="wifi-ssid">Network Name (SSID)</label><input id="wifi-ssid" placeholder="MyWiFiNetwork"></div>
            <div class="row">
                <div class="form-group"><label for="wifi-password">Password</label><input id="wifi-password" placeholder="Network password"></div>
                <div class="form-group"><label for="wifi-encryption">Encryption</label><select id="wifi-encryption"><option value="WPA">WPA/WPA2</option><option value="WEP">WEP</option><option value="nopass">None</option></select></div>
            </div>
            <div class="form-group"><label for="wifi-hidden">Hidden Network</label><select id="wifi-hidden"><option value="false">No</option><option value="true">Yes</option></select></div>
        </div>
        <div id="fields-calendar" class="field-group hidden">
            <div class="form-group"><label for="cal-summary">Event Title</label><input id="cal-summary" placeholder="Team Meeting"></div>
            <div class="form-group"><label for="cal-location">Location</label><input id="cal-location" placeholder="Conference Room A"></div>
            <div class="form-group"><label for="cal-description">Description</label><textarea id="cal-description" placeholder="Event description..."></textarea></div>
            <div class="row">
                <div class="form-group"><label for="cal-start">Start Date & Time</label><input type="datetime-local" id="cal-start"></div>
                <div class="form-group"><label for="cal-end">End Date & Time</label><input type="datetime-local" id="cal-end"></div>
            </div>
        </div>
        <div id="fields-geo" class="field-group hidden">
            <div class="row">
                <div class="form-group"><label for="geo-lat">Latitude</label><input type="number" step="any" id="geo-lat" placeholder="40.7128"></div>
                <div class="form-group"><label for="geo-lng">Longitude</label><input type="number" step="any" id="geo-lng" placeholder="-74.0060"></div>
            </div>
        </div>
        <div id="fields-payment" class="field-group hidden">
            <div class="form-group"><label for="payment-type">Payment Type</label><select id="payment-type"><option value="paypal">PayPal</option><option value="venmo">Venmo</option><option value="cashapp">Cash App</option><option value="upi">UPI (India)</option><option value="wechat">WeChat Pay</option><option value="alipay">Alipay</option></select></div>
            <div class="form-group"><label for="payment-id">Payment ID / Handle</label><input id="payment-id" placeholder="paypal.me/username or @cashapphandle"></div>
            <div class="form-group"><label for="payment-amount">Amount (optional)</label><input type="number" step="0.01" id="payment-amount" placeholder="0.00"></div>
        </div>
        <div id="fields-appstore" class="field-group hidden">
            <div class="form-group"><label for="appstore-platform">Platform</label><select id="appstore-platform"><option value="ios">iOS (App Store)</option><option value="android">Android (Google Play)</option></select></div>
            <div class="form-group"><label for="appstore-id">App ID / Package Name</label><input id="appstore-id" placeholder="com.example.app or app ID number"></div>
        </div>
        <div id="fields-binary" class="field-group hidden">
            <div class="form-group"><label for="binary-hex">Hex Data</label><input id="binary-hex" placeholder="48656c6c6f20576f726c64"></div>
            <p style="font-size: 0.85rem; color: #666; margin-top: -12px; margin-bottom: 16px;">Enter hex-encoded bytes (e.g., 48656c6c6f = Hello)</p>
        </div>
        <button class="btn btn-primary" id="generate-btn">Generate QR Code</button>
        <div id="qr-result">
            <h3 style="margin-bottom: 16px; color: #333;">Your QR Code</h3>
            <div id="qr-canvas"></div>
            <div class="data-preview" id="data-preview"></div>
            <div class="btn-group">
                <button class="btn btn-success" id="download-btn">Download PNG</button>
                <button class="btn btn-danger" id="reset-btn">Reset</button>
            </div>
        </div>
    </div>
    <script>
        const qrType = document.getElementById('qr-type');
        const generateBtn = document.getElementById('generate-btn');
        const downloadBtn = document.getElementById('download-btn');
        const resetBtn = document.getElementById('reset-btn');
        const qrResult = document.getElementById('qr-result');
        const qrCanvas = document.getElementById('qr-canvas');
        const dataPreview = document.getElementById('data-preview');

        // QR Code generation using QRCode.js library
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js';
        script.onload = function() {
            generateBtn.disabled = false;
            generateBtn.textContent = 'Generate QR Code';
        };
        script.onerror = function() {
            generateBtn.disabled = false;
            generateBtn.textContent = 'Generate QR Code';
            alert('Failed to load QR library. Please check your internet connection and reload.');
        };
        generateBtn.disabled = true;
        generateBtn.textContent = 'Loading QR library...';
        document.head.appendChild(script);

        let qrInstance = null;
        qrType.addEventListener('change', function() {
            document.querySelectorAll('.field-group').forEach(el => el.classList.add('hidden'));
            if (this.value) {
                const fields = document.getElementById('fields-' + this.value);
                if (fields) fields.classList.remove('hidden');
            }
            qrResult.classList.remove('show');
        });

        function buildData() {
            const type = qrType.value;
            if (!type) return null;
            switch(type) {
                case 'text':
                    return document.getElementById('text-content').value.trim();
                case 'url':
                    return document.getElementById('url-content').value.trim();
                case 'vcard': {
                    const first = document.getElementById('vcard-firstname').value.trim();
                    const last = document.getElementById('vcard-lastname').value.trim();
                    const phone = document.getElementById('vcard-phone').value.trim();
                    const email = document.getElementById('vcard-email').value.trim();
                    const org = document.getElementById('vcard-org').value.trim();
                    const notes = document.getElementById('vcard-notes').value.trim();
                    let v = 'BEGIN:VCARD\nVERSION:3.0\n';
                    v += 'N:' + last + ';' + first + ';;;\n';
                    v += 'FN:' + first + ' ' + last + '\n';
                    if (phone) v += 'TEL:' + phone + '\n';
                    if (email) v += 'EMAIL:' + email + '\n';
                    if (org) v += 'ORG:' + org + '\n';
                    if (notes) v += 'NOTE:' + notes + '\n';
                    v += 'END:VCARD';
                    return v;
                }
                case 'phone':
                    return 'tel:' + document.getElementById('phone-content').value.trim();
                case 'sms': {
                    const p = document.getElementById('sms-phone').value.trim();
                    const m = document.getElementById('sms-message').value.trim();
                    if (!p) return null;
                    return 'SMSTO:' + p + ':' + m;
                }
                case 'email': {
                    const to = document.getElementById('email-to').value.trim();
                    const sub = document.getElementById('email-subject').value.trim();
                    const body = document.getElementById('email-body').value.trim();
                    if (!to) return null;
                    let mailto = 'mailto:' + to;
                    const parts = [];
                    if (sub) parts.push('subject=' + encodeURIComponent(sub));
                    if (body) parts.push('body=' + encodeURIComponent(body));
                    if (parts.length) mailto += '?' + parts.join('&');
                    return mailto;
                }
                case 'wifi': {
                    const ssid = document.getElementById('wifi-ssid').value.trim();
                    const pass = document.getElementById('wifi-password').value;
                    const enc = document.getElementById('wifi-encryption').value;
                    const hid = document.getElementById('wifi-hidden').value;
                    if (!ssid) return null;
                    return 'WIFI:S:' + ssid + ';T:' + enc + ';P:' + pass + ';H:' + hid + ';;';
                }
                case 'calendar': {
                    const summary = document.getElementById('cal-summary').value.trim();
                    const location = document.getElementById('cal-location').value.trim();
                    const desc = document.getElementById('cal-description').value.trim();
                    const start = document.getElementById('cal-start').value;
                    const end = document.getElementById('cal-end').value;
                    if (!summary || !start) return null;
                    const fmt = (d) => d.replace(/[-:]/g, '').replace('T', 'Z') + '00';
                    let c = 'BEGIN:VEVENT\nSUMMARY:' + summary + '\nDTSTART:' + fmt(start);
                    if (end) c += '\nDTEND:' + fmt(end);
                    if (location) c += '\nLOCATION:' + location;
                    if (desc) c += '\nDESCRIPTION:' + desc;
                    c += '\nEND:VEVENT\nEND:VCALENDAR';
                    return c;
                }
                case 'geo': {
                    const lat = document.getElementById('geo-lat').value.trim();
                    const lng = document.getElementById('geo-lng').value.trim();
                    if (!lat || !lng) return null;
                    return 'geo:' + lat + ',' + lng;
                }
                case 'payment': {
                    const payType = document.getElementById('payment-type').value;
                    const payId = document.getElementById('payment-id').value.trim();
                    const amount = document.getElementById('payment-amount').value.trim();
                    if (!payId) return null;
                    let uri = '';
                    switch(payType) {
                        case 'paypal': uri = 'https://paypal.me/' + payId + (amount ? '/' + amount : ''); break;
                        case 'venmo': uri = 'https://venmo.com/' + payId + (amount ? '?amount=' + amount : ''); break;
                        case 'cashapp': uri = 'https://cash.app/$' + payId + (amount ? '/' + amount : ''); break;
                        case 'upi': uri = 'upi://pay?pa=' + payId + (amount ? '&am=' + amount : ''); break;
                        case 'wechat': uri = 'wechat://pay?user=' + payId + (amount ? '&amount=' + amount : ''); break;
                        case 'alipay': uri = 'alipay://alipayclient/transact?from=alipay&method=alipay.alipayuser.profile.info.get&config={"profileId":"' + payId + '"}'; break;
                    }
                    return uri;
                }
                case 'appstore': {
                    const platform = document.getElementById('appstore-platform').value;
                    const appId = document.getElementById('appstore-id').value.trim();
                    if (!appId) return null;
                    if (platform === 'ios') return 'https://apps.apple.com/app/id' + appId;
                    return 'https://play.google.com/store/apps/details?id=' + appId;
                }
                case 'binary': {
                    const hex = document.getElementById('binary-hex').value.trim().replace(/\s/g, '');
                    if (!hex) return null;
                    let result = '';
                    for (let i = 0; i < hex.length; i += 2) {
                        result += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
                    }
                    return result;
                }
                default: return null;
            }
        }

        generateBtn.addEventListener('click', function() {
            const data = buildData();
            if (!data) { alert('Please fill in all required fields.'); return; }
            if (typeof QRCode === 'undefined') {
                alert('QR library is still loading. Please wait a moment and try again.');
                return;
            }
            qrCanvas.innerHTML = '';
            qrInstance = new QRCode(qrCanvas, {
                text: data, width: 250, height: 250,
                colorDark: '#000000', colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M
            });
            dataPreview.textContent = data;
            qrResult.classList.add('show');
            qrResult.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });

        downloadBtn.addEventListener('click', function() {
            const canvas = qrCanvas.querySelector('canvas');
            if (!canvas) { alert('No QR code to download. Please generate one first.'); return; }
            const link = document.createElement('a');
            link.download = 'qrcode-' + qrType.value + '-' + Date.now() + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        resetBtn.addEventListener('click', function() {
            qrType.value = '';
            document.querySelectorAll('.field-group').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('input, textarea, select').forEach(el => {
                if (el.tagName === 'SELECT') el.selectedIndex = 0;
                else el.value = '';
            });
            qrResult.classList.remove('show');
            qrCanvas.innerHTML = '';
            qrInstance = null;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA' && !qrResult.classList.contains('show')) {
                generateBtn.click();
            }
        });
    </script>
</body>
</html>
